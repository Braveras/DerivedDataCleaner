name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build
        run: |
          xcodebuild build \
            -project DerivedDataCleaner.xcodeproj \
            -scheme DerivedDataCleaner \
            -configuration Release \
            -derivedDataPath "${{ github.workspace }}/build" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package
        run: |
          APP="${{ github.workspace }}/build/Build/Products/Release/DerivedDataCleaner.app"
          ditto -c -k --sequesterRsrc --keepParent "$APP" DerivedDataCleaner.zip

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: DerivedDataCleaner.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Homebrew Tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          [ -z "$GH_TOKEN" ] && echo "HOMEBREW_TAP_TOKEN not set, skipping" && exit 0
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(shasum -a 256 DerivedDataCleaner.zip | awk '{print $1}')

          {
            echo 'cask "deriveddatacleaner" do'
            echo "  version \"${VERSION}\""
            echo "  sha256 \"${SHA256}\""
            echo ''
            echo '  url "https://github.com/Braveras/DerivedDataCleaner/releases/download/v#{version}/DerivedDataCleaner.zip"'
            echo '  name "DerivedDataCleaner"'
            echo '  desc "One-click menu bar app to clear Xcode DerivedData"'
            echo '  homepage "https://github.com/Braveras/DerivedDataCleaner"'
            echo ''
            echo '  app "DerivedDataCleaner.app"'
            echo 'end'
          } > cask.rb

          FILE_SHA=$(gh api /repos/Braveras/homebrew-tap/contents/Casks/deriveddatacleaner.rb --jq .sha)
          CONTENT=$(base64 -i cask.rb)

          gh api \
            --method PUT \
            /repos/Braveras/homebrew-tap/contents/Casks/deriveddatacleaner.rb \
            -f message="chore: bump deriveddatacleaner to ${VERSION}" \
            -f content="${CONTENT}" \
            -f sha="${FILE_SHA}"
